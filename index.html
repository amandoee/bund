<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Russisk Roulette: Zara Larsson Edition</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🍺</text></svg>">
    <style>
        :root {
            --bg-color: #1a1a1a;
            --accent-color: #ff4d4d;
            --metallic: linear-gradient(145deg, #333, #111);
            --gold: #ffd700;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            touch-action: manipulation; /* Disables double-tap to zoom */
            user-select: none; /* Standard */
            -webkit-user-select: none; /* Safari */
            -moz-user-select: none; /* Firefox */
            -ms-user-select: none; /* Internet Explorer/Edge */
        }

        body {
            background-color: var(--bg-color);
            color: #fff;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            touch-action: manipulation;
        }

        h1 {
            font-size: 1.5rem;
            margin-bottom: 2rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--accent-color);
            text-shadow: 0 0 10px rgba(255, 77, 77, 0.5);
            text-align: center;
            padding: 0 10px;
        }

        /* 3D Cylinder Container */
        .stage {
            width: 300px;
            height: 300px;
            perspective: 1000px;
            position: relative;
            margin-bottom: 3rem;
        }

        .cylinder {
            width: 100%;
            height: 100%;
            position: absolute;
            transform-style: preserve-3d;
            transition: transform 6s cubic-bezier(0.1, 0, 0.1, 1);
            transform: rotateX(-10deg) rotateY(0deg);
        }

        .chamber {
            position: absolute;
            width: 120px;
            height: 120px;
            left: 90px;
            top: 90px;
            border: 4px solid #444;
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: var(--metallic);
            box-shadow: inset 0 0 20px rgba(0,0,0,0.8);
            backface-visibility: visible;
            text-align: center;
            padding: 10px;
            transition: border-color 0.3s, box-shadow 0.3s;
        }

        .chamber span {
            font-weight: bold;
            font-size: 0.9rem;
            color: #eee;
            text-shadow: 1px 1px 2px #000;
            word-wrap: break-word;
            padding: 0 5px;
        }

        .chamber.active {
            border-color: var(--gold);
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.6);
            background: linear-gradient(145deg, #443300, #111);
        }

        .pointer {
            position: absolute;
            top: -30px;
            left: 50%;
            transform: translateX(-50%);
            width: 40px;
            height: 40px;
            background: var(--accent-color);
            clip-path: polygon(50% 100%, 0 0, 100% 0);
            z-index: 10;
            filter: drop-shadow(0 0 5px rgba(255, 77, 77, 0.8));
        }

        .controls {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
            width: 100%;
            max-width: 300px;
        }

        #spin-btn {
            background: var(--accent-color);
            color: white;
            border: none;
            padding: 1rem 2.5rem;
            font-size: 1.2rem;
            font-weight: bold;
            text-transform: uppercase;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3), 0 0 15px rgba(255, 77, 77, 0.4);
            transition: transform 0.2s, background 0.2s;
            width: 100%;
        }

        #spin-btn:active {
            transform: scale(0.95);
        }

        #spin-btn:disabled {
            background: #555;
            box-shadow: none;
            cursor: not-allowed;
        }

        #result {
            margin-top: 2rem;
            font-size: 1.1rem;
            text-align: center;
            min-height: 3rem;
            padding: 0 20px;
            line-height: 1.4;
        }

        .highlight {
            color: var(--gold);
            font-weight: bold;
            display: block;
            font-size: 1.3rem;
            margin-top: 5px;
        }

        #youtube-player {
            position: absolute;
            top: 0;
            left: 0;
            width: 1px;
            height: 1px;
            opacity: 0.01;
            pointer-events: none;
        }

        #overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
            transition: opacity 0.5s;
        }

        #overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }
    
        /* Menu Styles */
        #menu-btn { position: absolute; top: 15px; right: 15px; background: none; border: none; color: #fff; font-size: 2rem; cursor: pointer; z-index: 50; }
        #menu-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 200; display: flex; flex-direction: column; padding: 20px; overflow-y: auto; transform: translateX(100%); transition: transform 0.3s ease; }
        #menu-modal.open { transform: translateX(0); }
        .menu-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 1px solid #444; padding-bottom: 10px; }
        #close-menu-btn { background: none; border: none; color: #fff; font-size: 2rem; cursor: pointer; }
        .menu-section { margin-bottom: 20px; }
        .menu-section h2 { color: var(--accent-color); margin-bottom: 10px; }
        .radio-group { display: flex; gap: 15px; margin-bottom: 15px; }
        .radio-group label { display: flex; align-items: center; gap: 5px; cursor: pointer; font-size: 1.1rem; }
        #participant-list { display: none; flex-direction: column; gap: 10px; max-height: 40vh; overflow-y: auto; background: #222; padding: 15px; border-radius: 10px; }
        #participant-list.visible { display: flex; }
        .participant-item { display: flex; align-items: center; gap: 10px; }
        .participant-item input[type="checkbox"] { width: 20px; height: 20px; accent-color: var(--accent-color); }
        .rules-text { background: #222; padding: 15px; border-radius: 10px; white-space: pre-wrap; font-size: 0.9rem; line-height: 1.5; color: #ccc; }
</style>
</head>
<body>

    <div id="menu-modal">
        <div class="menu-header">
            <h2>Indstillinger</h2>
            <button id="close-menu-btn">×</button>
        </div>
        <div class="menu-section">
            <h2>Vælg Udgave</h2>
            <div class="radio-group">
                <label><input type="radio" name="edition" value="zara" checked> Zara Larsson</label>
                <label><input type="radio" name="edition" value="normal"> Normal</label>
            </div>
        </div>
        <div class="menu-section" id="participants-section" style="display: none;">
            <h2>Deltagere (<span id="selected-count">0</span> valgt)</h2>
            <div style="margin-bottom: 10px;">
                <button id="select-all-btn" style="background: #444; color: #fff; border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer;">Vælg Alle</button>
                <button id="deselect-all-btn" style="background: #444; color: #fff; border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer;">Fravælg Alle</button>
            </div>
            <div id="participant-list"></div>
        </div>
        <div class="menu-section">
            <h2>Regler</h2>
            <div class="rules-text" id="rules-container"></div>
        </div>
    </div>

    <div id="overlay">Loading Music...</div>

    <h1 id="main-title">Russian Roulette <br> Zara Larsson Edition</h1>

    <div class="stage">
        <div class="pointer"></div>

    { "name": "Viktor", "song": "Dark Room", "artist": "Tobias Rahim", "id": "ijWB-x0ZOl8" }
  ],
  "rules": "1. Når ens sang kommer på, skal man bunde.\n2. Hvis ens drikkevare er mere end halv flydt tæller den som en bunder\n3. Hvis man lige har bundet, er man immun overfor sin bundesang en time efter\n4. Drikkevaren skal bundes inden bundesangen er færdig"
};
        
        let normalParticipants = [];
        let rulesText = normalData.rules;

        if (normalData.participants) {
            normalParticipants = normalData.participants.map(p => ({ ...p, checked: true }));
        }

        const savedChecks = localStorage.getItem('normalParticipantsChecks');
        if (savedChecks) {
            try {
                const parsed = JSON.parse(savedChecks);
                normalParticipants.forEach(p => {
                    if (parsed[p.name] !== undefined) p.checked = parsed[p.name];
                });
            } catch(e) {}
        }

        // State
        let currentEdition = 'zara';
        let currentRotation = 0;
        let isSpinning = false;
        let activeChambersData = [];
        let cheatCounter = 0;

        // DOM Elements
        const cylinder = document.getElementById('cylinder');
        const spinBtn = document.getElementById('spin-btn');
        const resultDisplay = document.getElementById('result');
        const overlay = document.getElementById('overlay');
        const mainTitle = document.getElementById('main-title');

        // Cheat Trigger
        mainTitle.addEventListener('click', () => {
            if (isSpinning) return;
            cheatCounter++;
            console.log("Cheat progress:", cheatCounter);
        });

        // Menu Elements
        const menuBtn = document.getElementById('menu-btn');
        const closeMenuBtn = document.getElementById('close-menu-btn');
        const menuModal = document.getElementById('menu-modal');
        const editionRadios = document.querySelectorAll('input[name="edition"]');
        const participantsSection = document.getElementById('participants-section');
        const participantList = document.getElementById('participant-list');
        const rulesContainer = document.getElementById('rules-container');
        const selectedCount = document.getElementById('selected-count');

        rulesContainer.textContent = rulesText;

        function renderParticipantList() {
            participantList.innerHTML = '';
            let count = 0;
            normalParticipants.forEach((p, index) => {
                if (p.checked) count++;
                const div = document.createElement('div');
                div.className = 'participant-item';
                div.innerHTML = `
                    <input type="checkbox" id="p-${index}" ${p.checked ? 'checked' : ''}>
                    <label for="p-${index}"><strong>${p.name}</strong> - <small>${p.song}</small></label>
                `;
                div.querySelector('input').addEventListener('change', (e) => {
                    normalParticipants[index].checked = e.target.checked;
                    saveChecks();
                    updateSelectedCount();
                    setupChambersForIdle();
                });
                participantList.appendChild(div);
            });
            selectedCount.textContent = count;
        }

        function updateSelectedCount() {
            const count = normalParticipants.filter(p => p.checked).length;
            selectedCount.textContent = count;
        }

        function saveChecks() {
            const checkMap = {};
            normalParticipants.forEach(p => { checkMap[p.name] = p.checked; });
            localStorage.setItem('normalParticipantsChecks', JSON.stringify(checkMap));
        }

        document.getElementById('select-all-btn').addEventListener('click', () => {
            normalParticipants.forEach(p => p.checked = true);
            renderParticipantList();
            saveChecks();
            setupChambersForIdle();
        });

        document.getElementById('deselect-all-btn').addEventListener('click', () => {
            normalParticipants.forEach(p => p.checked = false);
            renderParticipantList();
            saveChecks();
            setupChambersForIdle();
        });

        function renderCylinder(data) {
            cylinder.innerHTML = '';
            if (data.length === 0) return;

            const angleStep = 360 / data.length;
            const chamberWidth = Math.max(40, Math.min(120, 800 / data.length));
            const radius = Math.max(130, (data.length * chamberWidth) / (2 * Math.PI));

            data.forEach((p, i) => {
                const div = document.createElement('div');
                div.className = 'chamber';
                div.style.width = `${chamberWidth}px`;
                div.style.height = `${chamberWidth}px`;
                div.style.left = `${150 - chamberWidth/2}px`;
                div.style.top = `${150 - chamberWidth/2}px`;
                div.style.transform = `rotateY(${i * angleStep}deg) translateZ(${radius}px)`;
                div.innerHTML = `<span>${p.name}</span>`;
                if (chamberWidth < 60) div.querySelector('span').style.fontSize = '0.6rem';
                cylinder.appendChild(div);
            });
        }

        function setupChambersForIdle() {
            if (currentEdition === 'zara') {
                activeChambersData = [...zaraOutcomes, ...zaraOutcomes];
            } else {
                activeChambersData = normalParticipants.filter(p => p.checked);
            }
            renderCylinder(activeChambersData);
            resultDisplay.innerHTML = "";
        }

        // Initialize
        renderParticipantList();
        setupChambersForIdle();
        window.addEventListener('resize', setupChambersForIdle);

        menuBtn.addEventListener('click', () => menuModal.classList.add('open'));
        closeMenuBtn.addEventListener('click', () => menuModal.classList.remove('open'));

        editionRadios.forEach(radio => {
            radio.addEventListener('change', (e) => {
                currentEdition = e.target.value;
                participantsSection.style.display = currentEdition === 'normal' ? 'block' : 'none';
                participantList.classList.toggle('visible', currentEdition === 'normal');
                mainTitle.innerHTML = currentEdition === 'normal' ? "Russian Roulette <br> Normal Edition" : "Russian Roulette <br> Zara Larsson Edition";
                setupChambersForIdle();
            });
        });

        function getRandomInt(max) {
            const array = new Uint32Array(1);
            window.crypto.getRandomValues(array);
            return array[0] % max;
        }

        // YouTube API
        let player;
        window.onYouTubeIframeAPIReady = function() {
            player = new YT.Player('youtube-player', {
                height: '0', width: '0',
                videoId: zaraOutcomes[0].id,
                host: 'https://www.youtube-nocookie.com',
                playerVars: { 'origin': window.location.origin, 'enablejsapi': 1, 'autoplay': 1 },
                events: {
                    'onReady': () => overlay.classList.add('hidden'),
                    'onError': (e) => {
                        overlay.classList.add('hidden');
                        if (e.data === 150 || e.data === 101) resultDisplay.innerHTML += "<br><small style='color:orange'>Warning: Music restricted.</small>";
                    }
                }
            });
        };

        setTimeout(() => overlay.classList.add('hidden'), 5000);

        const fireAudio = new Audio('fire.mp3');
        function playFireSound() {
            fireAudio.currentTime = 0;
            fireAudio.play().catch(e => console.error(e));
        }

        function spin() {
            if (isSpinning) return;
            if (activeChambersData.length === 0) { alert("Vælg mindst én deltager!"); return; }

            isSpinning = true;
            spinBtn.disabled = true;
            resultDisplay.innerHTML = "GET READY...";
            document.querySelectorAll('.chamber').forEach(c => c.classList.remove('active'));

            if (player && player.stopVideo) player.stopVideo();

            let targetIndex;
            if (cheatCounter === 6) {
                // Rig for Claes
                const idx = activeChambersData.findIndex(p => p.name === "Claes");
                targetIndex = (idx !== -1) ? idx : getRandomInt(activeChambersData.length);
                cheatCounter = 0;
            } else if (cheatCounter === 4) {
                // Rig for Rynke/Rynkeby
                const idx = activeChambersData.findIndex(p => p.name === "Rynke" || p.name === "Rynkeby");
                targetIndex = (idx !== -1) ? idx : getRandomInt(activeChambersData.length);
                cheatCounter = 0;
            } else {
                targetIndex = getRandomInt(activeChambersData.length);
                cheatCounter = 0;
            }


            const chosenOutcome = activeChambersData[targetIndex];
            const angleStep = 360 / activeChambersData.length;
            
            if (player && chosenOutcome.id) {
                player.cueVideoById(chosenOutcome.id);
                player.mute();
                player.playVideo();
            }

            const extraSpins = (8 + getRandomInt(5)) * 360;
            const chamberAngle = targetIndex * angleStep;
            const currentMod = currentRotation % 360;
            const targetRotation = currentRotation - extraSpins - chamberAngle - currentMod;
            
            cylinder.style.transform = `rotateX(-10deg) rotateY(${targetRotation}deg)`;
            currentRotation = targetRotation;

            setTimeout(() => {
                isSpinning = true; 
                playFireSound();
                resultDisplay.innerHTML = `FISSE! <span class="highlight">${chosenOutcome.name} drikker!</span><br><small>Afspiller: ${chosenOutcome.song}</small>`;
                
                if (player && chosenOutcome.id) {
                    player.unMute();
                    player.seekTo(0);
                    player.playVideo();
                }
                const chambersDOM = document.querySelectorAll('.chamber');
                if (chambersDOM[targetIndex]) chambersDOM[targetIndex].classList.add('active');
                
                isSpinning = false;
                spinBtn.disabled = false;
            }, 6000);
        }

        spinBtn.addEventListener('click', spin);
        document.getElementById('stop-btn').addEventListener('click', () => player && player.stopVideo && player.stopVideo());
